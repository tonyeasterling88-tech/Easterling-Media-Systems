name: Sync Beehiiv

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Beehiiv content
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ vars.BEEHIIV_PUBLICATION_ID }}
          BEEHIIV_PUBLICATION_NAME: ${{ vars.BEEHIIV_PUBLICATION_NAME }}
        run: npm run sync:beehiiv

      - name: Commit updated Beehiiv data
        run: |
          if [[ -n "$(git status --porcelain assets/beehiiv-posts.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/beehiiv-posts.json
            git commit -m "chore: sync beehiiv archive"
            git push
          fi
