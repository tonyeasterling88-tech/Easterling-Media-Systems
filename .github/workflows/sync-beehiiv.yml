name: Sync Content Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Beehiiv content
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ vars.BEEHIIV_PUBLICATION_ID }}
          BEEHIIV_PUBLICATION_NAME: ${{ vars.BEEHIIV_PUBLICATION_NAME }}
        run: npm run sync:beehiiv

      - name: Sync YouTube content
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: UCNhXHBT6Efo1xEjIGKgPNKw
          YOUTUBE_CHANNEL_URL: https://www.youtube.com/@NagiKumoChillFi
        run: npm run sync:youtube

      - name: Commit updated content data
        run: |
          if [[ -n "$(git status --porcelain assets/beehiiv-posts.json assets/youtube-videos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/beehiiv-posts.json assets/youtube-videos.json
            git commit -m "chore: sync content feeds"
            git push
          fi
